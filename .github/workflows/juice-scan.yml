name: OWASP Juice Shop Attack Lab
on: [push, workflow_dispatch]

jobs:
  security-lab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Start Juice Shop in the background
      - name: Launch Juice Shop
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop:latest
          # Give it 30 seconds to fully load the database and server
          sleep 30

      # STEP 3: OWASP ZAP "Baseline" Scan
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000'
          fail_action: false # Keep it running so we can see the full report

          # 4. CODE QUALITY: SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # This is the secret you just added

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bkimminich/juice-shop:latest'
          format: 'table'
          # Remove filters to see EVERYTHING
          severity: 'LOW,MEDIUM,HIGH,CRITICAL' 
          vuln-type: 'os,library'
          exit-code: '0'
        
